{% extends "base.html" %}
{% load i18n django_bootstrap5 %}

{% block content %}
<div class="container mt-4" style="max-width: 900px;">
    <h1 class="my-4">{% trans "Update expense" %}</h1>

    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary">{% trans "Update" %}</button>
    </form>
</div>
{% endblock %}
