{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container wrapper flex-grow-1" style="max-width: 900px;">
    <h1 class="my-4">{% trans "Dashboard" %}</h1>
    <div class="card">
        <div class="card-body p-5 bg-light">
            <div class="display-4">{% trans "Welcome to Qaltamda!" %}</div>
            <p class="lead">{% trans "It helps you to keep track of your money" %}</p>
            <hr>
            <a class="btn btn-primary btn-lg" href="{% url 'expenses:create' %}">
                {% trans "Add new expense" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
